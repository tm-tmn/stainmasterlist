<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูล - Login</title>
    <link rel="stylesheet" href="style-index.css">
</head>
<body>

    <div class="container">
        <div class="card" id="loginSection">
            <div class="card-header">
                <h2>เข้าสู่ระบบ</h2>
                <p>กรุณากรอกข้อมูลเพื่อเข้าใช้งาน</p>
            </div>
            <div class="card-body">
                <div class="input-group">
                    <label for="user">Username</label>
                    <input type="text" id="user" placeholder="ระบุชื่อผู้ใช้งาน">
                </div>
                <div class="input-group">
                    <label for="pass">Password</label>
                    <input type="password" id="pass" placeholder="ระบุรหัสผ่าน">
                </div>
                <button id="loginBtn">เข้าสู่ระบบ</button>
            </div>
        </div>

        <div class="card" id="welcomeSection" style="display:none;">
            <div class="card-header">
                <h2 id="welcomeMsg">ยินดีต้อนรับ</h2>
                <p id="deptMsg">แผนกของคุณ</p>
            </div>
            <div class="card-body">
                <div class="status-success">✓ เข้าสู่ระบบสำเร็จ</div>
                <button class="btn-outline" onclick="location.reload()">ออกจากระบบ</button>
            </div>
        </div>
    </div>

    <script src="script-index.js"></script>
</body>
</html>
