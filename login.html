<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body {
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        height: 100vh !important; /* บังคับความสูงคงที่ */
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        margin: 0;
      }

      /* ป้องกัน SweetAlert2 มาแก้ความสูง auto */
      html.swal2-shown, 
      body.swal2-shown {
        height: 100vh !important;
        overflow: hidden !important;
      }
      .login-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 25px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        width: 100%;
        max-width: 400px;
      }
      .login-header { text-align: center; margin-bottom: 30px; }
      .login-header i { font-size: 50px; color: #3b82f6; }
      .form-control { border-radius: 10px; padding: 12px; margin-bottom: 15px; }
      .btn-login { 
        background: linear-gradient(to right, #6366f1, #a855f7);
        border: none; color: white; padding: 12px; border-radius: 10px;
        width: 100%; font-weight: bold; transition: 0.3s;
      }
      .btn-login:hover { transform: translateY(-2px); opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-header">
        <i class="bi bi-shield-lock-fill"></i>
        <h3 class="mt-2">Stain Master List</h3>
      </div>
      
    <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
      <div class="mb-3">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" id="user" class="form-control mb-0" placeholder="Username" required>
        </div>
      </div>
      
      <div class="mb-4">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-key"></i></span>
          <input type="password" id="pass" class="form-control mb-0" placeholder="Password" required>
        </div>
      </div>
      
      <button type="submit" class="btn-login">SIGN IN</button>
    </form>

  <script>
    function handleLogin() {
      const u = document.getElementById('user').value;
      const p = document.getElementById('pass').value;
      
      if(!u || !p) {
        Swal.fire('Warning', 'กรุณากรอกข้อมูลให้ครบ', 'warning');
        return;
      }

      Swal.fire({
        title: 'กำลังตรวจสอบ...',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
      });

      google.script.run
        .withSuccessHandler(res => {
          if(res.status === "Success") {
            // เก็บค่าไว้ใน Session เผื่อเรียกใช้ในหน้าอื่นด้วย
            sessionStorage.setItem('stain_token', res.token);
            sessionStorage.setItem('stain_user', res.userName);
            
            // ✅ ใช้ URL ที่ Server ส่งกลับมาให้ (ซึ่งมี Token เรียบร้อยแล้ว)
            window.open(res.url, '_top'); 
          } else {
            Swal.fire('Error', 'Username หรือ Password ไม่ถูกต้อง', 'error');
          }
        })
        .checkLogin(u, p);
    }
  </script>
  </body>
</html>
