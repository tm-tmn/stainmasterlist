  <script>
    // ✅ แทน window.userName = "<?= userName ?>" ทั้งหมด
    document.addEventListener('DOMContentLoaded', function () {
      const session = getSession();

      // Guard: ถ้าไม่มี session ให้กลับ login
      if (!session.token || !session.user) {
        redirectToLogin();
        return;
      }

      // ใส่ค่าใน sidebar
      document.getElementById('userAvatar').textContent      = session.user.charAt(0).toUpperCase();
      document.getElementById('displayUserName').textContent = session.user;
      document.getElementById('displayUserDept').textContent = session.dept;

      // แสดงเมนู Admin ถ้ามีสิทธิ์
      if (session.dept === 'Admin' || session.dept === 'Application Specialist') {
        document.getElementById('admin-menu-item').style.display = 'block';
      }
    });
  </script>

  <!-- ✅ แทน <?!= include('JavaScriptdatatable') ?> และ <?!= include('JavaScriptCommon') ?> -->
