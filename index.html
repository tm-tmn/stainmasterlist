<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
        // 🚩 1. ทำลายข้อมูลการ Login ทั้งหมดทันทีที่เข้ามาหน้านี้
        localStorage.clear(); 
        
        // หากคุณมีการใช้ sessionStorage ด้วย (เผื่อไว้) ให้ล้างด้วย
        sessionStorage.clear();
    
        // 🚩 2. หลังจากล้างเสร็จแล้ว ให้เตะไปหน้า login.html เท่านั้น
        // เพราะตอนนี้ isLoggedIn จะไม่มีทางเป็น "true" แล้ว
        window.location.href = "login.html";
    </script>
    
    <meta http-equiv="refresh" content="2; url=login.html">
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <p>กำลังนำคุณเข้าสู่ระบบ...</p>
        <small>หากระบบไม่เปลี่ยนหน้าอัตโนมัติ <a href="login.html">คลิกที่นี่</a></small>
    </div>
</body>
</html>
