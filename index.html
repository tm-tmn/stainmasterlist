<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stain Database</title>
 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style-index.css">
 
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div class="login-card">
      <div class="login-header">
        <i class="bi bi-shield-lock-fill"></i>
        <h3 class="mt-2">Stain Master List</h3>
      </div>
 
      <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" id="user" class="form-control mb-0" placeholder="Username" required>
          </div>
        </div>
 
        <div class="mb-4">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-key"></i></span>
            <input type="password" id="pass" class="form-control mb-0" placeholder="Password" required>
          </div>
        </div>
 
        <button type="submit" class="btn-login">SIGN IN</button>
      </form>
    </div>
 
    <script src="script-common.js"></script>
    <script src="script-index.js"></script>
  </body>
</html>
